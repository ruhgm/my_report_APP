{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Report App{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- AOS for scroll animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<!-- ===== MODERN NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm glass-navbar">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'images/logo.jpg' %}" alt="Report App Logo" height="32">
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Left links -->
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'add_report' %}">Add Report</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'report_list' %}">View Reports</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'add_rv' %}">Add Return Visit</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'rv_list' %}">Return Visits</a>
                </li>
            </ul>

            <!-- Right side -->
            <ul class="navbar-nav align-items-center">
                {% if user.is_authenticated %}
                    <li class="nav-item mr-3">
                        <span class="navbar-text text-dark">
                            Hello, {{ user.username }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-primary nav-btn" href="{% url 'custom_logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="btn btn-primary nav-btn" href="{% url 'login' %}">Login</a>
                    </li>
                {% endif %}
                
                <!-- Dark Mode Toggle -->
                <li class="nav-item ml-2">
                    <button id="darkToggle" class="btn btn-outline-secondary nav-btn">🌙</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== PAGE CONTENT ===== -->
<div class="container mt-5 pt-5">
    {% block content %}
    {% endblock %}
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    // Initialize scroll animations
    AOS.init({ duration: 800, once: true });

    // Dark mode toggle
    const toggleBtn = document.getElementById("darkToggle");
    toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        toggleBtn.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
        localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
    });

    if(localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        toggleBtn.textContent = "☀️";
    }
</script>

</body>
</html>
