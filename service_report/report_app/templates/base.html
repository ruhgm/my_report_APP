{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Report App{% endblock %}</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<!-- ✅ NAVBAR (Shared Across All Pages) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
   <a class="navbar-brand" href="{% url 'home' %}">
    <img src="{% static 'images/logo.jpg' %}" alt="Report App Logo" height="40">
</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">

            

            <li class="nav-item">
                <a class="nav-link" href="{% url 'add_report' %}">Add Report</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'report_list' %}">View Reports</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'add_rv' %}">Add Return Visit</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'rv_list' %}">Return Visits</a>
            </li>
        </ul>

        <!-- Right side -->
        <ul class="navbar-nav">
            {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="navbar-text mr-3">
                        Hello, {{ user.username }}
                    </span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'custom_logout' %}">Logout</a>
                </li>
           
            {% endif %}
        </ul>
    </div>
</nav>

<!-- ✅ Page Content Goes Here -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
