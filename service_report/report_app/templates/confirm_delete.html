{% extends 'base.html' %}

{% block title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Glass Card -->
            <div class="card glass-card shadow-sm p-4 text-center">
                <h2 class="mb-3">Confirm Deletion</h2>
                <p class="mb-4">Are you sure you want to delete the report for <strong>{{ report.date }}</strong>?</p>

                <form method="POST" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'report_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
