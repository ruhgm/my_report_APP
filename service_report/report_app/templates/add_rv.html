{% extends 'base.html' %}

{% block title %}Add Return Visit{% endblock %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Glass Card -->
            <div class="card glass-card shadow-sm p-4">
                <h2 class="text-center mb-4">Add Return Visit</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="name">Person's Name</label>
                        <input type="text" class="form-control modern-input" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" class="form-control modern-input" id="address" name="address" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Next Visit Date</label>
                        <input type="date" class="form-control modern-input" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea class="form-control modern-input" id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-3">Add Visit</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
