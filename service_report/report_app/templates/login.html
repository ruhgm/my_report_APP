{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Glass Card -->
            <div class="card glass-card shadow-sm p-4">
                <h2 class="text-center mb-4">Login</h2>

                {% if messages %}
                    <div class="alert alert-info">
                        {% for message in messages %}
                            {{ message }}<br>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control modern-input" id="username" name="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control modern-input" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-3">Login</button>
                </form>

                <p class="text-center mt-3">
                    Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
