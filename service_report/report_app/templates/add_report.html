{% extends 'base.html' %}

{% block title %}Add Report{% endblock %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Glass Card -->
            <div class="card glass-card shadow-sm p-4">
                <h2 class="text-center mb-4">Field Service Report</h2>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" class="form-control modern-input" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="time_spent">Time Spent (Hours:Minutes)</label>
                        <input type="text" class="form-control modern-input" id="id_time_spent" name="time_spent" 
                               value="{{ form.time_spent.value|default:'' }}" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-3">Add Report</button>
                </form>

                <p class="text-center mt-3">
                    <a href="{% url 'report_list' %}" class="btn btn-secondary">Back to Dashboard</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
