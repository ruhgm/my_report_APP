{% extends 'base.html' %}

{% block title %}Add Return Visit{% endblock %}

{% block content %}
    <div class="container mt-5">
        <h1 class="text-center">Field Service Report</h1>
<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" class="form-control" id="date" name="date" required>
    </div>
    <div class="form-group">
        <label for="time_spent">Time Spent (Hours:Minutes):</label>
       <input type="text" class="form-control" id="id_time_spent" name="time_spent" value="{{ form.time_spent.value|default:'' }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Report</button>
</form>
        <br>
        <a href="{% url 'report_list' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
{% endblock %}
